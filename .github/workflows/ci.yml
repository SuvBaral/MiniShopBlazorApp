name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test-dotnet:
    name: .NET Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/GitSimple.UI.Tests/ --no-build --configuration Release --logger "console;verbosity=normal"

  test-typescript:
    name: TypeScript Tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/extension.tests/package-lock.json

      - name: Install test dependencies
        working-directory: tests/extension.tests
        run: npm ci

      - name: Run tests
        working-directory: tests/extension.tests
        run: npm test
